name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────
  # L1 + G1 + G2 — Core quality gate from base-ci
  # ─────────────────────────────────────────────────────
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@v2026.4
    with:
      bun-version: "1.3.11"
      pre-command: "bun run build"
      typecheck-command: "bun x tsc --noEmit"
      test-command: "bun run test:unit:coverage && bun run test:integration"
      enable-security: "true"
      osv-config: "osv-scanner.toml"
      # L2/L3/Worker are defined locally for full secret control
      enable-l2: "false"
      enable-l3: "false"
      enable-worker: "false"
    secrets: inherit

  # ─────────────────────────────────────────────────────
  # L2: API E2E (real HTTP against a fully local stack)
  # Runs in PARALLEL with quality for faster CI.
  #
  # No remote Cloudflare resources — scripts/test-stack.ts spins up
  # `wrangler dev --local` (Miniflare D1 + KV) and a local R2 fs shim.
  # ─────────────────────────────────────────────────────
  api-e2e:
    name: "L2 API E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Only AUTH_SECRET / WORKER_SECRET remain — everything Cloudflare-shaped
      # is provided by the local Miniflare stack at runtime.
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile --ignore-scripts

      # test-stack.ts shells out to `wrangler` for migrations + dev server
      - name: Install wrangler globally
        run: bun install -g wrangler@4

      - name: "L2: API E2E tests"
        run: bun run test:api

  # ─────────────────────────────────────────────────────
  # L3: Browser E2E (Playwright against the same local stack)
  # Runs in PARALLEL with quality for faster CI.
  # ─────────────────────────────────────────────────────
  browser-e2e:
    name: "L3 Browser E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile --ignore-scripts

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Install wrangler globally
        run: bun install -g wrangler@4

      - name: "L3: Playwright E2E tests"
        run: bun run test:e2e:pw

  # ─────────────────────────────────────────────────────
  # Worker: Edge Worker unit tests
  # Runs in PARALLEL with quality for faster CI.
  # ─────────────────────────────────────────────────────
  worker-tests:
    name: "Worker Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile --ignore-scripts

      - name: "Worker: Unit tests"
        run: bun run test
