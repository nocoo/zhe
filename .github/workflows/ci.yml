name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────
  # L1 + G1 + G2 — Core quality gate from base-ci
  # ─────────────────────────────────────────────────────
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@v2026.1
    with:
      bun-version: "1.3.11"
      pre-command: "bun run build"
      typecheck-command: "bun x tsc --noEmit"
      test-command: "bun run test:unit:coverage && bun run test:integration"
      osv-config: "osv-scanner.toml"
      # L2/L3/Worker are defined locally for full secret control
      enable-l2: "false"
      enable-l3: "false"
      enable-worker: "false"
    secrets: inherit

  # ─────────────────────────────────────────────────────
  # L2: API E2E (real HTTP against test D1/R2/KV)
  # Runs in PARALLEL with quality for faster CI.
  #
  # ISOLATION: All Cloudflare resources point to test instances:
  # - D1: D1_TEST_DATABASE_ID (run-api-e2e.ts validates != prod)
  # - D1 Proxy: D1_TEST_PROXY_URL (must contain "-test")
  # - R2: R2_TEST_BUCKET_NAME / R2_TEST_PUBLIC_DOMAIN
  # - KV: KV_TEST_NAMESPACE_ID
  # ─────────────────────────────────────────────────────
  api-e2e:
    name: "L2 API E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # D1 — test database (run-api-e2e.ts validates testDbId != prodDbId)
      CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
      D1_TEST_DATABASE_ID: ${{ secrets.D1_TEST_DATABASE_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # D1 Worker proxy — test Worker (run-api-e2e.ts validates URL contains "-test")
      D1_TEST_PROXY_URL: ${{ secrets.D1_TEST_PROXY_URL }}
      D1_TEST_PROXY_SECRET: ${{ secrets.D1_TEST_PROXY_SECRET }}
      # R2 — test bucket
      R2_TEST_BUCKET_NAME: ${{ secrets.R2_TEST_BUCKET_NAME }}
      R2_TEST_PUBLIC_DOMAIN: ${{ secrets.R2_TEST_PUBLIC_DOMAIN }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_USER_HASH_SALT: ${{ secrets.R2_USER_HASH_SALT }}
      # KV — test namespace
      KV_TEST_NAMESPACE_ID: ${{ secrets.KV_TEST_NAMESPACE_ID }}
      # Auth
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile

      - name: Build (required for Next.js dev server)
        run: bun run build

      - name: "L2: API E2E tests"
        run: bun run test:api

  # ─────────────────────────────────────────────────────
  # L3: Browser E2E (Playwright against test D1/R2/KV)
  # Runs in PARALLEL with quality for faster CI.
  #
  # ISOLATION: Same as L2 — all Cloudflare resources point to test instances.
  # global-setup.ts validates testDbId != prodDbId and checks _test_marker table.
  # ─────────────────────────────────────────────────────
  browser-e2e:
    name: "L3 Browser E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # D1 — test database (global-setup.ts validates testDbId != prodDbId)
      CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
      D1_TEST_DATABASE_ID: ${{ secrets.D1_TEST_DATABASE_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # D1 Worker proxy — test Worker
      D1_TEST_PROXY_URL: ${{ secrets.D1_TEST_PROXY_URL }}
      D1_TEST_PROXY_SECRET: ${{ secrets.D1_TEST_PROXY_SECRET }}
      # R2 — test bucket
      R2_TEST_BUCKET_NAME: ${{ secrets.R2_TEST_BUCKET_NAME }}
      R2_TEST_PUBLIC_DOMAIN: ${{ secrets.R2_TEST_PUBLIC_DOMAIN }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_USER_HASH_SALT: ${{ secrets.R2_USER_HASH_SALT }}
      # KV — test namespace
      KV_TEST_NAMESPACE_ID: ${{ secrets.KV_TEST_NAMESPACE_ID }}
      # Auth
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build (required for Next.js dev server)
        run: bun run build

      - name: "L3: Playwright E2E tests"
        run: bun run test:e2e:pw

  # ─────────────────────────────────────────────────────
  # Worker: Edge Worker unit tests
  # Runs in PARALLEL with quality for faster CI.
  # ─────────────────────────────────────────────────────
  worker-tests:
    name: "Worker Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - run: bun install --frozen-lockfile

      - name: "Worker: Unit tests"
        run: bun run test
