name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    uses: nocoo/base-ci/.github/workflows/bun-quality.yml@v2026
    with:
      bun-version: "1.3.11"
      pre-command: "bun run build --no-lint"
      typecheck-command: "bun x tsc --noEmit"
      test-command: "bun run test:unit:coverage && bun run test:integration"
      osv-config: "osv-scanner.toml"
      enable-l2: "true"
      l2-command: "bun run test:api"
    secrets: inherit
